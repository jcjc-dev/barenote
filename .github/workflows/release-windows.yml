name: Release Windows (Store)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-sign:
    name: Build, Sign & Package for Windows Store
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Set version
        shell: pwsh
        run: |
          $conf = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $conf.version = "${{ inputs.version }}"
          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

      # Import code signing certificate
      - name: Import code signing certificate
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath = Join-Path $env:RUNNER_TEMP "certificate.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)

          Import-PfxCertificate -FilePath $certPath `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)

          # Get and output the thumbprint for signing
          $cert = Get-PfxCertificate -FilePath $certPath
          echo "CERTIFICATE_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV

      # Build NSIS installer (standard distribution)
      - name: Build Tauri app (NSIS)
        run: npx tauri build --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      # Sign the NSIS installer
      - name: Sign NSIS installer
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "certificate.pfx"
          $installers = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" -Recurse

          foreach ($installer in $installers) {
            & signtool sign /fd SHA256 /f $certPath `
              /p $env:WINDOWS_CERTIFICATE_PASSWORD `
              /t "http://timestamp.digicert.com" `
              $installer.FullName
            Write-Host "Signed: $($installer.Name)"
          }

      # Build MSIX package for Windows Store
      - name: Create MSIX package
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_PUBLISHER: ${{ secrets.WINDOWS_PUBLISHER }}
        run: |
          $appName = "BareNote"
          $version = "${{ inputs.version }}.0"
          $certPath = Join-Path $env:RUNNER_TEMP "certificate.pfx"
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          $msixDir = "src-tauri/target/release/bundle/msix"
          $iconDir = "src-tauri/icons"

          # Create MSIX staging directory
          New-Item -ItemType Directory -Force -Path $msixDir

          # Find the built exe
          $mainExe = Get-ChildItem -Path "src-tauri/target/release" -Filter "*.exe" | Where-Object { $_.Name -eq "BareNote.exe" -or $_.Name -eq "barenote.exe" } | Select-Object -First 1

          if (-not $mainExe) {
            Write-Error "Could not find built executable"
            exit 1
          }

          # Copy exe and assets to staging
          Copy-Item $mainExe.FullName -Destination "$msixDir/"

          # Create AppxManifest.xml
          $publisherName = "${{ secrets.WINDOWS_PUBLISHER_DISPLAY_NAME }}"
          $publisherId = "${{ secrets.WINDOWS_PUBLISHER }}"
          $exeName = $mainExe.Name

          $manifest = @"
          <?xml version="1.0" encoding="utf-8"?>
          <Package xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10"
                   xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10"
                   xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities">
            <Identity Name="${publisherName}.BareNote"
                      Publisher="${publisherId}"
                      Version="${version}"
                      ProcessorArchitecture="x64" />
            <Properties>
              <DisplayName>BareNote</DisplayName>
              <PublisherDisplayName>${publisherName}</PublisherDisplayName>
              <Logo>StoreLogo.png</Logo>
            </Properties>
            <Dependencies>
              <TargetDeviceFamily Name="Windows.Desktop" MinVersion="10.0.17763.0" MaxVersionTested="10.0.22621.0" />
            </Dependencies>
            <Resources>
              <Resource Language="en-us" />
            </Resources>
            <Applications>
              <Application Id="BareNote" Executable="${exeName}" EntryPoint="Windows.FullTrustApplication">
                <uap:VisualElements DisplayName="BareNote"
                                    Description="A minimal, distraction-free note-taking app"
                                    BackgroundColor="transparent"
                                    Square150x150Logo="Square150x150Logo.png"
                                    Square44x44Logo="Square44x44Logo.png" />
              </Application>
            </Applications>
            <Capabilities>
              <rescap:Capability Name="runFullTrust" />
            </Capabilities>
          </Package>
          "@

          Set-Content -Path "$msixDir/AppxManifest.xml" -Value $manifest

          # Copy icon assets
          Copy-Item "$iconDir/StoreLogo.png" -Destination "$msixDir/"
          Copy-Item "$iconDir/Square150x150Logo.png" -Destination "$msixDir/"
          Copy-Item "$iconDir/Square44x44Logo.png" -Destination "$msixDir/"

          # Create MSIX package using makeappx
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\makeappx.exe" -Recurse | Sort-Object -Descending | Select-Object -First 1
          & $makeappx.FullName pack /d $msixDir /p "$msixDir/$appName-${{ inputs.version }}.msix" /o

          # Sign the MSIX package
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -Recurse | Sort-Object -Descending | Select-Object -First 1
          & $signtool.FullName sign /fd SHA256 /f $certPath `
            /p $env:WINDOWS_CERTIFICATE_PASSWORD `
            /t "http://timestamp.digicert.com" `
            "$msixDir/$appName-${{ inputs.version }}.msix"

          Write-Host "MSIX package created and signed: $appName-${{ inputs.version }}.msix"

      # Upload NSIS installer artifact
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: BareNote-Windows-NSIS-${{ inputs.version }}
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

      # Upload MSIX artifact for Store submission
      - name: Upload MSIX package
        uses: actions/upload-artifact@v4
        with:
          name: BareNote-Windows-MSIX-${{ inputs.version }}
          path: src-tauri/target/release/bundle/msix/*.msix
          retention-days: 30

      # Cleanup
      - name: Cleanup certificate
        if: always()
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "certificate.pfx"
          if (Test-Path $certPath) { Remove-Item $certPath -Force }
