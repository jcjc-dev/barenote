name: Release macOS (DMG / Direct Distribution)

# Use this workflow for distributing outside the App Store (website, GitHub Releases, etc.)
# Requires: Developer ID Application certificate + notarization
# Produces: a signed, notarized .dmg that passes macOS Gatekeeper

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  APP_NAME: BareNote

jobs:
  build-sign-notarize:
    name: Build, Sign, Notarize & Package DMG
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Set version
        run: |
          sed -i '' 's/"version": ".*"/"version": "${{ inputs.version }}"/' src-tauri/tauri.conf.json

      # Import Developer ID Application certificate
      - name: Import Developer ID certificate
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/developer_id.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

          echo -n "$APPLE_DEVELOPER_ID_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      # Build universal binary and sign with Developer ID
      - name: Build Tauri app (aarch64)
        run: npx tauri build --target aarch64-apple-darwin --bundles app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_SIGNING_IDENTITY }}

      - name: Build Tauri app (x86_64)
        run: npx tauri build --target x86_64-apple-darwin --bundles app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_SIGNING_IDENTITY }}

      - name: Create universal binary
        run: |
          ARM_APP="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/${{ env.APP_NAME }}.app"
          X86_APP="src-tauri/target/x86_64-apple-darwin/release/bundle/macos/${{ env.APP_NAME }}.app"
          UNIVERSAL_DIR="src-tauri/target/universal-apple-darwin/release/bundle/macos"
          UNIVERSAL_APP="$UNIVERSAL_DIR/${{ env.APP_NAME }}.app"

          mkdir -p "$UNIVERSAL_DIR"
          cp -R "$ARM_APP" "$UNIVERSAL_APP"

          lipo -create \
            "$ARM_APP/Contents/MacOS/${{ env.APP_NAME }}" \
            "$X86_APP/Contents/MacOS/${{ env.APP_NAME }}" \
            -output "$UNIVERSAL_APP/Contents/MacOS/${{ env.APP_NAME }}"

          echo "UNIVERSAL_APP=$UNIVERSAL_APP" >> $GITHUB_ENV

      # Re-sign the universal binary
      - name: Sign universal binary
        env:
          APPLE_DEVELOPER_ID_SIGNING_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_SIGNING_IDENTITY }}
        run: |
          # Sign nested components first
          find "$UNIVERSAL_APP" -type f \( -name "*.dylib" -o -name "*.so" \) -exec \
            codesign --force --options runtime \
            --sign "$APPLE_DEVELOPER_ID_SIGNING_IDENTITY" {} \;

          find "$UNIVERSAL_APP/Contents/Frameworks" -type d -name "*.framework" -exec \
            codesign --force --options runtime \
            --sign "$APPLE_DEVELOPER_ID_SIGNING_IDENTITY" {} \; 2>/dev/null || true

          # Sign the main app
          codesign --force --options runtime \
            --sign "$APPLE_DEVELOPER_ID_SIGNING_IDENTITY" \
            --entitlements src-tauri/entitlements/Entitlements.plist \
            "$UNIVERSAL_APP"

          # Verify
          codesign --verify --deep --strict --verbose=2 "$UNIVERSAL_APP"

      # Notarize with Apple
      - name: Notarize app
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          # Write API key to file
          mkdir -p ~/private_keys
          echo -n "$APPLE_API_KEY" | base64 --decode \
            -o ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          # Zip the app for submission
          ZIP_PATH=$RUNNER_TEMP/${{ env.APP_NAME }}.zip
          ditto -c -k --keepParent "$UNIVERSAL_APP" "$ZIP_PATH"

          # Submit for notarization and wait for result
          xcrun notarytool submit "$ZIP_PATH" \
            --key ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait \
            --timeout 20m

          # Staple the notarization ticket to the app
          xcrun stapler staple "$UNIVERSAL_APP"

          # Verify stapling
          xcrun stapler validate "$UNIVERSAL_APP"
          spctl --assess --type execute --verbose "$UNIVERSAL_APP"

      # Create DMG
      - name: Create DMG
        run: |
          DMG_PATH="src-tauri/target/${{ env.APP_NAME }}-${{ inputs.version }}.dmg"

          # Use hdiutil to create a clean DMG
          STAGING_DIR=$RUNNER_TEMP/dmg-staging
          mkdir -p "$STAGING_DIR"
          cp -R "$UNIVERSAL_APP" "$STAGING_DIR/"

          # Create a symlink to /Applications for drag-install UX
          ln -s /Applications "$STAGING_DIR/Applications"

          hdiutil create \
            -volname "${{ env.APP_NAME }}" \
            -srcfolder "$STAGING_DIR" \
            -ov -format UDZO \
            "$DMG_PATH"

          echo "DMG_PATH=$DMG_PATH" >> $GITHUB_ENV

      # Optionally sign the DMG itself
      - name: Sign DMG
        env:
          APPLE_DEVELOPER_ID_SIGNING_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_SIGNING_IDENTITY }}
        run: |
          codesign --sign "$APPLE_DEVELOPER_ID_SIGNING_IDENTITY" "$DMG_PATH"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macOS-${{ inputs.version }}
          path: ${{ env.DMG_PATH }}
          retention-days: 30

      # Cleanup
      - name: Cleanup
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f $RUNNER_TEMP/*.p12
          rm -rf ~/private_keys
